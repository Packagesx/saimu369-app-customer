<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>สั่งซื้อชุดไหว้เทพ - สายมู 369</title>

  <!-- ตั้งชื่อ/ไอคอนตอนกด "เพิ่มไปหน้าจอหลัก" บนมือถือ -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="สั่งของไหว้ 369">
  <meta name="theme-color" content="#4a2c68">

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: radial-gradient(circle at 50% 35%, #4a2c66, #241536 75%);
      font-family: 'Sarabun', 'Tahoma', sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .splash { text-align: center; color: #f6e9c9; padding: 0 24px; }
    .splash img {
      width: 96px; height: 96px; border-radius: 22px;
      box-shadow: 0 6px 24px rgba(0,0,0,.35);
      animation: pulse 1.6s ease-in-out infinite;
    }
    .splash h1 { font-size: 17px; font-weight: 600; margin: 18px 0 6px; }
    .splash p { font-size: 12.5px; color: #c9a34e; margin: 0; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: .85; }
    }
    #manualArea { display: none; margin-top: 22px; }
    #manualArea .hint {
      font-size: 12px; color: #f6e9c9; opacity: .85; line-height: 1.6;
      margin-bottom: 14px;
    }
    #manualBtn {
      display: inline-block;
      background: linear-gradient(135deg, #f0d896, #c9a34e);
      color: #241536; font-weight: 700; font-size: 14px;
      padding: 12px 28px; border-radius: 999px; text-decoration: none;
      box-shadow: 0 4px 14px rgba(0,0,0,.3);
    }
  </style>
</head>
<body>
  <div class="splash">
    <!-- แนะนำให้เซฟรูปไอคอนที่คุณออกแบบมาไว้ในชื่อ icon-512.png แล้วนำมาวางในโฟลเดอร์เดียวกัน -->
    <img src="icon-512.png" alt="สายมู 369">
    <h1>🙏 สั่งซื้อชุดไหว้เทพ</h1>
    <p id="statusText">กำลังพาท่านเข้าสู่หน้าร้าน...</p>

    <div id="manualArea">
      <p class="hint">
        <b>💡 แนะนำเพื่อความสะดวก:</b><br>
        ให้กดปุ่มแชร์ (Share) ที่เบราว์เซอร์ แล้วเลือก <b>"เพิ่มไปยังหน้าจอโฮม" (Add to Home Screen)</b><br>
        เพื่อให้ครั้งต่อไปกดสั่งซื้อผ่านไอคอนแอปได้ทันที
      </p>
      <a id="manualBtn" href="#">เข้าสู่หน้าร้านตอนนี้</a>
    </div>
  </div>

  <script>
    // ⚠️ นำลิงก์ Web App ของคุณ (ที่เติม ?page=order แล้ว) มาวางตรงนี้
    var CUSTOMER_URL = 'https://script.google.com/macros/s/AKfycby6yKUG9FDf9r29OR0o7uWbsJrZ_jss9g4-Y2DEbQiuNCD7YZD5PGXDWfN1k_KrTlFd/exec?page=order';

    function isStandalone() {
      return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
        || window.navigator.standalone === true; 
    }

    document.getElementById('manualBtn').href = CUSTOMER_URL;
    document.getElementById('manualBtn').onclick = function () {
      window.location.href = CUSTOMER_URL;
    };

    if (isStandalone()) {
      // หากลูกค้าเปิดผ่านไอคอนบนมือถือ จะทำการสลับไปหน้าสั่งซื้อทันที
      setTimeout(function () {
        window.location.replace(CUSTOMER_URL);
      }, 500);
    } else {
      // หากเปิดผ่านเบราว์เซอร์ปกติ จะหยุดอยู่ที่หน้านี้เพื่อให้ลูกค้ามีเวลาเซฟลงหน้าจอโฮม
      document.getElementById('statusText').style.display = 'none';
      document.getElementById('manualArea').style.display = 'block';
    }
  </script>
</body>
</html>
